{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block main_class %}narrow{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="tl.title"></h1>
    <p class="page-subtitle" data-i18n="tl.subtitle"></p>
  </div>
</div>

<div class="controls">
  <div class="field">
    <label data-i18n="common.month"></label>
    <input type="month" id="month" onchange="loadKPI()">
  </div>
  <div class="spacer"></div>
  <div id="teamBadge" class="text-muted" style="font-size:13px"></div>
</div>

<div id="scorePreview" class="hidden">
  <div class="score-display">
    <div class="num" id="scoreNum">—</div>
    <div class="label" id="scoreLabel" data-i18n="tl.score"></div>
    <div class="sublabel" id="ratingLabel"></div>
  </div>
</div>

<div id="noTeam" class="hidden">
  <div class="empty-state">
    <div class="empty-icon">⚠️</div>
    <div data-i18n="tl.no_team"></div>
  </div>
</div>

<div id="kpiContent" class="hidden">
  <div class="form-section">
    <div class="form-section-title" data-i18n="tl.auto_section"></div>
    <div id="autoRows"></div>
  </div>

  <div class="form-section">
    <div class="form-section-title" data-i18n="tl.manual_section"></div>
    <div id="manualRows"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TL_ID = {{ user.id }};
let cfg = null;
let kpiData = null;

async function init() {
  cfg = await api("/api/kpi/config");
  const now = new Date();
  document.getElementById("month").value =
    now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
  loadKPI();
}

async function loadKPI() {
  const month = document.getElementById("month").value;
  if (!month) return;

  document.getElementById("scorePreview").classList.add("hidden");
  document.getElementById("kpiContent").classList.add("hidden");
  document.getElementById("noTeam").classList.add("hidden");

  try {
    kpiData = await api(`/api/kpi/tl-kpi/${TL_ID}/${month}`);
    render(kpiData);
  } catch (e) {
    if (e.error_code === "no_team_assigned") {
      document.getElementById("noTeam").classList.remove("hidden");
    } else {
      toastError(e);
    }
  }
}

function render(data) {
  const lbl = key => t("kpi." + key);

  // Score
  document.getElementById("scorePreview").classList.remove("hidden");
  document.getElementById("scoreNum").textContent = data.total_score.toFixed(1);
  document.getElementById("ratingLabel").textContent = t("rating." + (data.rating || "Pending"));
  document.getElementById("scoreNum").className = "num " + scoreKindClass(data.total_score);

  document.getElementById("teamBadge").textContent =
    `${data.team_submitted} ${t("common.of")} ${data.team_size} ${t("tl.team_submitted_of")}`;

  // Auto fields
  const autoKeys = (cfg && cfg.tl_auto_fields) || [];
  document.getElementById("autoRows").innerHTML = autoKeys.map(key => {
    const b = data.breakdown[key];
    if (!b) return "";
    const pct = b.achievement_pct;
    return `
      <div class="kpi-row">
        <div class="kpi-label">${lbl(key)}</div>
        <div class="kpi-bar-wrap">
          <div class="kpi-bar" style="width:${Math.min(pct,100)}%;background:${barColor(pct)}"></div>
        </div>
        <div class="kpi-nums">
          <span class="actual">${fmtNum(b.actual)}</span>
          <span class="sep">/</span>
          <span class="target">${fmtNum(b.target)}</span>
          <span class="pct">${pct}%</span>
          <span class="weight">${b.weight}pt → ${b.weighted_score.toFixed(1)}</span>
        </div>
      </div>`;
  }).join("");

  // Manual fields
  const manualKeys = (cfg && cfg.tl_manual_fields) || [];
  const isPending = !data.tl_entry || !data.tl_entry.dataentry_submitted_at;
  document.getElementById("manualRows").innerHTML = isPending
    ? `<div class="text-muted" style="padding:12px">${t("tl.pending_eval")}</div>`
    : manualKeys.map(key => {
        const b = data.breakdown[key];
        if (!b) return "";
        const pct = b.achievement_pct;
        return `
          <div class="kpi-row">
            <div class="kpi-label">${lbl(key)}</div>
            <div class="kpi-bar-wrap">
              <div class="kpi-bar" style="width:${Math.min(pct,100)}%;background:${barColor(pct)}"></div>
            </div>
            <div class="kpi-nums">
              <span class="actual">${fmtNum(b.actual)}</span>
              <span class="sep">/</span>
              <span class="target">${fmtNum(b.target)}</span>
              <span class="pct">${pct}%</span>
              <span class="weight">${b.weight}pt → ${b.weighted_score.toFixed(1)}</span>
            </div>
          </div>`;
      }).join("");

  document.getElementById("kpiContent").classList.remove("hidden");
}

function onLangChange() { loadKPI(); }

function fmtNum(n) {
  if (n === undefined || n === null) return "—";
  return Number.isInteger(n) ? n : n.toFixed(1);
}

function scoreKindClass(score) {
  if (score >= 90) return "excellent";
  if (score >= 75) return "vgood";
  if (score >= 55) return "good";
  if (score >= 40) return "medium";
  return "weak";
}

function barColor(pct) {
  if (pct >= 90) return "var(--success)";
  if (pct >= 70) return "var(--warning)";
  return "var(--danger)";
}

init();
</script>
{% endblock %}
