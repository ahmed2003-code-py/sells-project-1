{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block head %}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="mk.title"></h1>
    <p class="page-subtitle" data-i18n="mk.subtitle"></p>
  </div>
  <button class="btn btn-primary" onclick="openNew()" data-i18n="mk.new_campaign"></button>
</div>

<!-- Campaign selector -->
<div class="controls" style="margin-bottom:20px">
  <div class="field" style="min-width:280px">
    <label data-i18n="mk.campaign"></label>
    <select id="campSelect" onchange="selectCampaign()"></select>
  </div>
  <div id="campActions" class="hidden" style="display:flex;gap:8px;align-items:flex-end">
    <button class="btn btn-sm" onclick="editCurrent()" data-i18n="common.edit"></button>
    <button class="btn btn-sm btn-danger" onclick="deleteCurrent()" data-i18n="common.delete"></button>
  </div>
</div>

<!-- Empty state -->
<div id="emptyState" class="empty-state">
  <div class="empty-state-icon"><span class="material-symbols-outlined" aria-hidden="true">analytics</span></div>
  <div data-i18n="mk.empty_state"></div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <div class="tab-bar" role="tablist" data-i18n-aria-label="mk.tabs_label" aria-label="Campaign phases">
    <button class="tab-btn active" id="tab-phase1" role="tab" aria-selected="true" aria-controls="phase1" tabindex="0" onclick="switchTab('phase1',this)" data-i18n="mk.phase1"></button>
    <button class="tab-btn" id="tab-phase2" role="tab" aria-selected="false" aria-controls="phase2" tabindex="-1" onclick="switchTab('phase2',this)" data-i18n="mk.phase2"></button>
  </div>

  <!-- PHASE 1 -->
  <div class="tab-pane active" id="phase1" role="tabpanel" aria-labelledby="tab-phase1" tabindex="0">
    <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.overview"></div>
    <div class="ov-grid" id="ovGrid"></div>

    <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.kpi_cards"></div>
    <div class="mkt-kpi-grid" id="kpiCards"></div>

    <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.scenarios_compare"></div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr>
          <th data-i18n="mk.scenario"></th>
          <th data-i18n="mk.scenario_ratio"></th>
          <th data-i18n="mk.target_cpd"></th>
          <th data-i18n="mk.target_cpl"></th>
          <th data-i18n="mk.exp_leads"></th>
          <th data-i18n="mk.exp_deals"></th>
          <th data-i18n="mk.target_deals"></th>
        </tr></thead>
        <tbody id="scenBody"></tbody>
      </table>
    </div>

    <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.funnel_req"></div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr>
          <th data-i18n="mk.scenario"></th>
          <th data-i18n="mk.target_deals"></th>
          <th data-i18n="mk.exp_meetings"></th>
          <th data-i18n="mk.min_meetings"></th>
          <th data-i18n="mk.max_meetings"></th>
          <th data-i18n="mk.exp_ql"></th>
          <th data-i18n="mk.exp_fu"></th>
          <th data-i18n="mk.min_fu"></th>
          <th data-i18n="mk.max_fu"></th>
        </tr></thead>
        <tbody id="funnelBody"></tbody>
      </table>
    </div>

    <div class="rec-box" id="recBox"></div>

    <div style="text-align:center;margin-top:24px">
      <button class="btn btn-primary" onclick="switchTab('phase2', document.querySelectorAll('.tab-btn')[1])"
              data-i18n="mk.goto_phase2"></button>
    </div>
  </div>

  <!-- PHASE 2 -->
  <div class="tab-pane" id="phase2" role="tabpanel" aria-labelledby="tab-phase2" tabindex="0">
    <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.final_targets"></div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr>
          <th data-i18n="mk.kpi"></th>
          <th data-i18n="mk.target_value"></th>
          <th data-i18n="mk.unit"></th>
          <th data-i18n="mk.note"></th>
        </tr></thead>
        <tbody id="targetBody"></tbody>
      </table>
    </div>

    <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.actuals_entry"></div>
    <div class="card" style="margin-bottom:24px">
      <div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">
          <div class="field">
            <label for="a_spend" data-i18n="mk.actual_spend"></label>
            <input type="number" min="0" id="a_spend" oninput="calcActuals()">
          </div>
          <div class="field">
            <label for="a_leads" data-i18n="mk.actual_leads"></label>
            <input type="number" min="0" id="a_leads" oninput="calcActuals()">
          </div>
          <div class="field">
            <label for="a_ql" data-i18n="mk.actual_ql"></label>
            <input type="number" min="0" id="a_ql" oninput="calcActuals()">
          </div>
          <div class="field">
            <label for="a_meet" data-i18n="mk.actual_meetings"></label>
            <input type="number" min="0" id="a_meet" oninput="calcActuals()">
          </div>
          <div class="field">
            <label for="a_fu" data-i18n="mk.actual_fu"></label>
            <input type="number" min="0" id="a_fu" oninput="calcActuals()">
          </div>
          <div class="field">
            <label for="a_deals" data-i18n="mk.actual_deals"></label>
            <input type="number" min="0" id="a_deals" oninput="calcActuals()">
          </div>
        </div>
        <div style="margin-top:16px;display:flex;gap:10px">
          <button class="btn btn-primary" onclick="saveActuals()" data-i18n="mk.save_actuals"></button>
        </div>
        <div class="mk-actuals-display">
          <div class="ov-item"><div class="lbl" data-i18n="mk.actual_cpl"></div><div class="val" id="disp_cpl">—</div></div>
          <div class="ov-item"><div class="lbl" data-i18n="mk.actual_cr"></div><div class="val" id="disp_cr">—</div></div>
          <div class="ov-item"><div class="lbl" data-i18n="mk.actual_cpd"></div><div class="val" id="disp_cpd">—</div></div>
          <div class="ov-item"><div class="lbl" data-i18n="mk.actual_rev_proxy"></div><div class="val" id="disp_rev">—</div></div>
        </div>
      </div>
    </div>

    <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.compare_title"></div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr>
          <th data-i18n="mk.kpi"></th>
          <th data-i18n="mk.col_target"></th>
          <th data-i18n="mk.col_actual"></th>
          <th data-i18n="mk.col_variance"></th>
          <th data-i18n="mk.col_variance_pct"></th>
          <th data-i18n="mk.col_achievement"></th>
          <th data-i18n="mk.col_status"></th>
        </tr></thead>
        <tbody id="compBody"></tbody>
      </table>
    </div>

    <div id="insightsSection" class="hidden">
      <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.analysis"></div>
      <div class="card" style="margin-bottom:24px">
        <div id="insightsBody"></div>
      </div>

      <div class="form-section-title" style="margin-bottom:12px" data-i18n="mk.correction_plan"></div>
      <div class="card" style="margin-bottom:24px">
        <div id="actionBody"></div>
      </div>
    </div>

    <div style="margin-top:8px;margin-bottom:24px">
      <div class="form-section-title" data-i18n="mk.formulas"></div>
      <div style="font-size:12px;color:var(--text-muted);line-height:2;font-family:var(--font-mono)" id="formulaBox"></div>
    </div>
  </div>
</div>

<!-- Campaign Modal -->
<div class="modal-backdrop" id="campModal" role="dialog" aria-modal="true" aria-labelledby="campModalTitle">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <div class="modal-title" id="campModalTitle"></div>
      <button class="modal-close" onclick="closeModal('campModal')" data-i18n-aria-label="common.close">✕</button>
    </div>
    <div class="modal-body">
      <div class="error-msg" id="campErr" role="alert" aria-live="assertive"></div>
      <div class="field">
        <label for="f_name"><span data-i18n="mk.field_name"></span> <span style="color:var(--danger)">*</span></label>
        <input type="text" id="f_name" style="width:100%" maxlength="200" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="f_price" data-i18n="mk.field_price"></label>
          <input type="number" min="0" id="f_price">
        </div>
        <div class="field">
          <label for="f_budget" data-i18n="mk.field_budget"></label>
          <input type="number" min="0" id="f_budget">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="f_comm" data-i18n="mk.field_comm"></label>
          <input type="number" min="0" step="0.01" id="f_comm">
        </div>
        <div class="field">
          <label for="f_ctype" data-i18n="mk.field_ctype"></label>
          <select id="f_ctype">
            <option value="percentage" data-i18n="mk.ctype_pct"></option>
            <option value="fixed" data-i18n="mk.ctype_fixed"></option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="f_cr" data-i18n="mk.field_cr"></label>
          <input type="number" min="0" max="100" step="0.1" id="f_cr">
        </div>
        <div class="field">
          <label for="f_tax" data-i18n="mk.field_tax"></label>
          <input type="number" min="0" max="100" id="f_tax" value="19">
        </div>
      </div>
      <div class="field">
        <label for="f_month" data-i18n="mk.field_month"></label>
        <input type="month" id="f_month">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveCampaign()" data-i18n="mk.save_campaign"></button>
      <button class="btn btn-ghost" onclick="closeModal('campModal')" data-i18n="common.cancel"></button>
    </div>
  </div>
</div>

<!-- Delete confirm modal — replaces native confirm() so the destructive action gets proper UX -->
<div class="modal-backdrop" id="campDeleteModal" role="dialog" aria-modal="true" aria-labelledby="campDeleteTitle">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <div class="modal-title" id="campDeleteTitle" data-i18n="mk.confirm_delete_title"></div>
      <button class="modal-close" onclick="closeModal('campDeleteModal')" data-i18n-aria-label="common.close">✕</button>
    </div>
    <div class="modal-body">
      <p data-i18n="mk.confirm_delete_body"></p>
      <p style="margin-top:10px;font-weight:600" id="campDeleteName"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="confirmDelete()" data-i18n="common.delete"></button>
      <button class="btn btn-ghost" onclick="closeModal('campDeleteModal')" data-i18n="common.cancel"></button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let campaigns = [];
let currentCamp = null;
let editingCampId = null;

const fmt  = n => n == null ? '—' : Number(n).toLocaleString(getLang()==='ar' ? 'ar-EG' : 'en-US', {maximumFractionDigits:0});
const fmt2 = n => n == null ? '—' : Number(n).toLocaleString(getLang()==='ar' ? 'ar-EG' : 'en-US', {maximumFractionDigits:2});
const fmtp = n => n == null ? '—' : Number(n).toFixed(1) + '%';

function egp(v) { return fmt2(v) + ' ' + t("mk.unit_egp"); }

// ─── Core KPI calculation ──────────────────────────────────────────
function calcKPIs(c) {
    const tax      = parseFloat(c.tax_rate);
    const cr       = parseFloat(c.expected_close_rate);
    const budget   = parseFloat(c.campaign_budget);
    const commIn   = parseFloat(c.commission_input);
    const price    = parseFloat(c.avg_unit_price);

    let gross = c.commission_type === 'percentage' ? price * (commIn / 100) : commIn;
    const net = gross * (1 - tax);

    const scenarios = [
        {key:'conservative', label:'Conservative', ratio:0.15},
        {key:'balanced',     label:'Balanced',     ratio:0.16},
        {key:'aggressive',   label:'Aggressive',   ratio:0.17},
    ].map(s => {
        const cpd  = net * s.ratio;
        const cpl  = cpd * cr;
        const expL = cpl > 0 ? budget / cpl : 0;
        const expD = expL * cr;
        const td   = Math.ceil(expD);
        return {
            ...s, cpd, cpl, expL: Math.round(expL), expD, td,
            minMeet: td*5, maxMeet: td*10, expMeet: td*7.5,
            expQL: td*25,
            minFU: td*40, maxFU: td*50, expFU: td*45,
        };
    });
    return { gross, net, tax, cr, budget, scenarios, rec: scenarios[1] };
}

// ─── Status helper ─────────────────────────────────────────────────
function status(actual, target, lessIsBetter) {
    if (actual == null || actual === '' || target === 0) return 'pend';
    const r = actual / target;
    if (lessIsBetter) {
        if (r <= 1)    return 'on';
        if (r <= 1.10) return 'warn';
        return 'crit';
    }
    if (r >= 0.95) return 'on';
    if (r >= 0.80) return 'warn';
    return 'crit';
}

// Status renders as the shared .status-pill component (icon + label + tinted background).
// Replaces the old text+emoji pattern; consistent with dashboard / dataentry.
const STATUS_ICON = { on: 'check_circle', warn: 'warning', crit: 'error', pend: 'remove' };
function statusPillHTML(code) {
  if (code === 'pend') {
    return `<span class="status-pill is-pending">
      <span class="material-symbols-outlined" aria-hidden="true">${STATUS_ICON.pend}</span>—
    </span>`;
  }
  const labels = { on: t("mk.status_on"), warn: t("mk.status_warn"), crit: t("mk.status_crit") };
  const cls = code === 'on' ? 'is-done' : code === 'warn' ? 'is-warn' : 'is-bad';
  return `<span class="status-pill ${cls}">
    <span class="material-symbols-outlined" aria-hidden="true">${STATUS_ICON[code]}</span>${labels[code]}
  </span>`;
}

// ─── Render Phase 1 ────────────────────────────────────────────────
function renderPhase1(c, calc) {
    const {net, gross, rec, scenarios} = calc;
    const taxRate = parseFloat(c.tax_rate);
    const taxAmt  = gross * taxRate;
    const commPct = c.commission_type === 'percentage' ? parseFloat(c.commission_input) : null;
    const commType = c.commission_type === 'percentage'
        ? `${c.commission_input}${t("mk.ct_pct_of_unit")}`
        : `${fmt(c.commission_input)} ${t("mk.ct_fixed_egp")}`;

    document.getElementById('ovGrid').innerHTML = [
        [t("mk.ov_name"), escapeHTML(c.campaign_name), ''],
        [t("mk.ov_avg_price"), egp(c.avg_unit_price), ''],
        [commPct != null ? `${t("mk.ov_gross_commission")} (${commPct}%)` : t("mk.ov_gross_commission"), egp(gross), commType],
        [`${t("mk.ov_tax")} (${(taxRate*100).toFixed(0)}%)`, egp(taxAmt), ''],
        [t("mk.ov_net_commission"), egp(net), ''],
        [t("mk.ov_close_rate"), fmtp(parseFloat(c.expected_close_rate)*100), ''],
        [t("mk.ov_budget"), egp(c.campaign_budget), ''],
    ].map(([l,v,s]) => `<div class="ov-item"><div class="lbl">${l}</div><div class="val">${v}</div>${s?`<div style="font-size:11px;color:var(--text-muted)">${s}</div>`:''}</div>`).join('');

    const scenColor = ['var(--accent-2)', 'var(--brand)', 'var(--warning)'];
    const scenBadge = [
        `<span class="mk-scen-badge mk-scen-cons">Conservative</span>`,
        `<span class="mk-scen-badge mk-scen-bal">Balanced</span>`,
        `<span class="mk-scen-badge mk-scen-agg">Aggressive</span>`,
    ];
    const kpiCards = [
        {lbl:t("mk.card_net_comm"),      val:egp(net), sub:'', color:'var(--text)'},
        {lbl:t("mk.card_cpd_cons"),      val:fmt2(scenarios[0].cpd), sub:'Conservative — ' + t("mk.unit_egp"), color:scenColor[0]},
        {lbl:t("mk.card_cpd_bal"),       val:fmt2(scenarios[1].cpd), sub:'Balanced — ' + t("mk.unit_egp"),     color:scenColor[1]},
        {lbl:t("mk.card_cpd_agg"),       val:fmt2(scenarios[2].cpd), sub:'Aggressive — ' + t("mk.unit_egp"),   color:scenColor[2]},
        {lbl:t("mk.card_cpl_cons"),      val:egp(scenarios[0].cpl), sub:'', color:scenColor[0]},
        {lbl:t("mk.card_cpl_bal"),       val:egp(scenarios[1].cpl), sub:'', color:scenColor[1]},
        {lbl:t("mk.card_cpl_agg"),       val:egp(scenarios[2].cpl), sub:'', color:scenColor[2]},
        {lbl:t("mk.card_deals_cons"),    val:scenarios[0].expD.toFixed(2)+' '+t("mk.unit_deal"), sub:'', color:scenColor[0]},
        {lbl:t("mk.card_deals_bal"),     val:scenarios[1].expD.toFixed(2)+' '+t("mk.unit_deal"), sub:'', color:scenColor[1]},
        {lbl:t("mk.card_deals_agg"),     val:scenarios[2].expD.toFixed(2)+' '+t("mk.unit_deal"), sub:'', color:scenColor[2]},
    ];
    document.getElementById('kpiCards').innerHTML = kpiCards.map(k =>
        `<div class="mkt-kpi-card"><div class="lbl">${k.lbl}</div><div class="val" style="color:${k.color}">${k.val}</div>${k.sub?`<div class="sub">${k.sub}</div>`:''}</div>`
    ).join('');

    document.getElementById('scenBody').innerHTML = scenarios.map((s,i) => `<tr>
        <td>${scenBadge[i]}</td>
        <td>${(s.ratio*100).toFixed(0)}%</td>
        <td>${fmt2(s.cpd)}</td>
        <td>${fmt2(s.cpl)}</td>
        <td>${fmt(s.expL)}</td>
        <td>${s.expD.toFixed(2)}</td>
        <td><strong>${s.td}</strong></td>
    </tr>`).join('');

    document.getElementById('funnelBody').innerHTML = scenarios.map((s,i) => `<tr>
        <td>${scenBadge[i]}</td>
        <td><strong>${s.td}</strong></td>
        <td>${s.expMeet}</td><td>${s.minMeet}</td><td>${s.maxMeet}</td>
        <td>${s.expQL}</td>
        <td>${s.expFU}</td><td>${s.minFU}</td><td>${s.maxFU}</td>
    </tr>`).join('');

    document.getElementById('recBox').innerHTML = `
        <div class="rec-title">${t("mk.rec_title")}</div>
        <div class="rec-grid">
          ${[
            [t("mk.scenario"), 'Balanced — 16%'],
            [t("mk.target_cpl"), egp(rec.cpl)],
            [t("mk.target_deals"), rec.td+' '+t("mk.unit_deals")],
            [t("mk.exp_meetings"), rec.expMeet],
            [t("mk.exp_ql"), rec.expQL],
            [t("mk.exp_fu"), rec.expFU],
          ].map(([l,v])=>`<div class="rec-item"><div class="lbl">${l}</div><div class="val">${v}</div></div>`).join('')}
        </div>`;
}

// ─── Render Phase 2 ────────────────────────────────────────────────
function renderPhase2(c, calc) {
    const {net, rec} = calc;
    document.getElementById('targetBody').innerHTML = [
        [t("mk.ov_budget"),          fmt(c.campaign_budget),           t("mk.unit_egp"),  ''],
        [t("mk.target_cpl"),         fmt2(rec.cpl),                    t("mk.unit_egp"),  t("mk.bal_scenario")],
        [t("mk.target_cpd"),         fmt2(rec.cpd),                    t("mk.unit_egp"),  '16% ' + t("mk.from_net")],
        ['Target Leads',             fmt(rec.expL),                    t("mk.unit_count"),''],
        [t("mk.target_deals"),       rec.td,                           t("mk.unit_deals"),''],
        [t("mk.exp_meetings"),       rec.expMeet,                      t("mk.unit_meet"), ''],
        [t("mk.exp_ql"),             rec.expQL,                        t("mk.unit_count"),''],
        [t("mk.exp_fu"),             rec.expFU,                        t("mk.unit_count"),''],
        ['Target Close Rate',        fmtp(parseFloat(c.expected_close_rate)*100), '%', ''],
        [t("mk.ov_net_commission"),  fmt2(net),                        t("mk.unit_egp"),  ''],
        ['Max Allowed Cost/Deal %',  '16%',                            '',                ''],
        ['Expected Revenue Proxy',   fmt2(rec.td * net),               t("mk.unit_egp"),  t("mk.targets_revenue_note")],
    ].map(([k,v,u,n])=>`<tr><td>${k}</td><td><strong>${v}</strong></td><td>${u}</td><td class="text-muted" style="font-size:12px">${n}</td></tr>`).join('');

    calcActuals();
}

// ─── Calc actuals live ────────────────────────────────────────────
function calcActuals() {
    if (!currentCamp) return;
    const calc = calcKPIs(currentCamp);
    const {net, rec} = calc;

    const spend  = parseFloat(document.getElementById('a_spend').value)  || null;
    const leads  = parseFloat(document.getElementById('a_leads').value)  || null;
    const ql     = parseFloat(document.getElementById('a_ql').value)     || null;
    const meet   = parseFloat(document.getElementById('a_meet').value)   || null;
    const fu     = parseFloat(document.getElementById('a_fu').value)     || null;
    const deals  = parseFloat(document.getElementById('a_deals').value)  || null;

    const aCPL   = leads  && spend  ? spend / leads  : null;
    const aCR    = leads  && deals  ? deals / leads  : null;
    const aCPD   = deals  && spend  ? spend / deals  : null;
    const aRev   = deals            ? deals * net    : null;

    document.getElementById('disp_cpl').textContent = aCPL  ? egp(aCPL) : '—';
    document.getElementById('disp_cr').textContent  = aCR   ? fmtp(aCR*100)      : '—';
    document.getElementById('disp_cpd').textContent = aCPD  ? egp(aCPD) : '—';
    document.getElementById('disp_rev').textContent = aRev  ? egp(aRev) : '—';

    const budget = parseFloat(currentCamp.campaign_budget);
    const rows = [
        {kpi:t("mk.actual_spend"),    act:spend, tgt:budget,     lib:true},
        {kpi:t("mk.actual_leads"),    act:leads, tgt:rec.expL,   lib:false},
        {kpi:t("mk.actual_ql"),       act:ql,    tgt:rec.expQL,  lib:false},
        {kpi:t("mk.actual_meetings"), act:meet,  tgt:rec.expMeet,lib:false},
        {kpi:t("mk.actual_fu"),       act:fu,    tgt:rec.expFU,  lib:false},
        {kpi:t("mk.actual_deals"),    act:deals, tgt:rec.td,     lib:false},
        {kpi:t("mk.actual_cr"),       act:aCR!=null?aCR*100:null, tgt:parseFloat(currentCamp.expected_close_rate)*100, lib:false},
        {kpi:t("mk.actual_cpl"),      act:aCPL,  tgt:rec.cpl,    lib:true},
        {kpi:t("mk.actual_cpd"),      act:aCPD,  tgt:rec.cpd,    lib:true},
        {kpi:t("mk.actual_rev_proxy"),act:aRev,  tgt:rec.td*net, lib:false},
    ];

    document.getElementById('compBody').innerHTML = rows.map(r => {
        const a = r.act; const tgt = r.tgt;
        const var_ = a != null ? a - tgt : null;
        const varP = a != null && tgt ? (a-tgt)/tgt*100 : null;
        const achP = a != null && tgt ? a/tgt*100 : null;
        const st   = status(a, tgt, r.lib);
        return `<tr>
            <td>${r.kpi}</td>
            <td>${fmt2(tgt)}</td>
            <td>${a != null ? fmt2(a) : '—'}</td>
            <td>${var_ != null ? (var_>=0?'+':'')+fmt2(var_) : '—'}</td>
            <td>${varP != null ? (varP>=0?'+':'')+varP.toFixed(1)+'%' : '—'}</td>
            <td>${achP != null ? achP.toFixed(1)+'%' : '—'}</td>
            <td>${statusPillHTML(st)}</td>
        </tr>`;
    }).join('');

    renderInsights(calc, {spend, leads, ql, meet, fu, deals, aCPL, aCR, aCPD, aRev});
}

function renderInsights(calc, a) {
    if (!a.leads && !a.deals) {
        document.getElementById('insightsSection').classList.add('hidden');
        return;
    }
    document.getElementById('insightsSection').classList.remove('hidden');
    const {rec} = calc;
    const budget = parseFloat(currentCamp.campaign_budget);
    const crTarget = parseFloat(currentCamp.expected_close_rate);
    const isAr = getLang() === 'ar';

    const M = {
      spendOk:    isAr ? `الإنفاق الفعلي (${egp(a.spend)}) تحت السيطرة`         : `Actual spend (${egp(a.spend)}) is within budget`,
      spendBad:   isAr ? `الإنفاق الفعلي (${egp(a.spend)}) تجاوز الميزانية (${egp(budget)})` : `Actual spend (${egp(a.spend)}) exceeded the budget (${egp(budget)})`,
      spendNone:  isAr ? 'لم يُدخل الإنفاق بعد'                                  : 'No spend entered yet',
      cplOk:      isAr ? `CPL الفعلي (${egp(a.aCPL)}) أفضل من المستهدف (${egp(rec.cpl)})` : `Actual CPL (${egp(a.aCPL)}) is better than target (${egp(rec.cpl)})`,
      cplBad:     isAr ? `CPL الفعلي (${egp(a.aCPL)}) أعلى من المستهدف (${egp(rec.cpl)})` : `Actual CPL (${egp(a.aCPL)}) is above target (${egp(rec.cpl)})`,
      cplNone:    isAr ? 'لم يُدخل CPL بعد'                                      : 'No CPL data yet',
      crOk:       isAr ? `Close Rate الفعلي (${fmtp(a.aCR*100)}) يحقق الخطة (${fmtp(crTarget*100)})` : `Actual close rate (${fmtp(a.aCR*100)}) meets the plan (${fmtp(crTarget*100)})`,
      crBad:      isAr ? `Close Rate الفعلي (${fmtp(a.aCR*100)}) أقل من المستهدف (${fmtp(crTarget*100)})` : `Actual close rate (${fmtp(a.aCR*100)}) is below target (${fmtp(crTarget*100)})`,
      crNone:     isAr ? 'لم يُدخل Close Rate بعد'                                : 'No close-rate data yet',
      leadsOk:    isAr ? `عدد الـ Leads كافٍ (${fmt(a.leads)} من ${fmt(rec.expL)})` : `Leads count is sufficient (${fmt(a.leads)} of ${fmt(rec.expL)})`,
      leadsBad:   isAr ? `عدد الـ Leads غير كافٍ — ${fmt(a.leads)} من ${fmt(rec.expL)}` : `Not enough leads — ${fmt(a.leads)} of ${fmt(rec.expL)}`,
      leadsNone:  isAr ? 'لم يُدخل Leads بعد'                                     : 'No leads data yet',
      qlOk:       isAr ? `لا يوجد Bottleneck في Qualified Leads (${fmt(a.ql)} من ${fmt(rec.expQL)})` : `No bottleneck in qualified leads (${fmt(a.ql)} of ${fmt(rec.expQL)})`,
      qlBad:      isAr ? `Bottleneck في Qualified Leads — ${fmt(a.ql)} من ${fmt(rec.expQL)}` : `Bottleneck in qualified leads — ${fmt(a.ql)} of ${fmt(rec.expQL)}`,
      qlNone:     isAr ? 'لم يُدخل Qualified Leads بعد'                           : 'No qualified leads data yet',
      meetOk:     isAr ? `لا يوجد Bottleneck في Meetings (${a.meet} من ${rec.expMeet})` : `No bottleneck in meetings (${a.meet} of ${rec.expMeet})`,
      meetBad:    isAr ? `Bottleneck في Meetings — ${a.meet} من ${rec.expMeet}`   : `Bottleneck in meetings — ${a.meet} of ${rec.expMeet}`,
      meetNone:   isAr ? 'لم يُدخل Meetings بعد'                                   : 'No meetings data yet',
      dealsOk:    isAr ? `عدد الـ Deals (${a.deals}) على المسار الصحيح (هدف ${rec.td})` : `Deals count (${a.deals}) is on track (target ${rec.td})`,
      dealsBad:   isAr ? `عدد الـ Deals (${a.deals}) أقل من الهدف (${rec.td})`    : `Deals count (${a.deals}) is below target (${rec.td})`,
      dealsNone:  isAr ? 'لم يُدخل Deals بعد'                                     : 'No deals data yet',
    };

    // status: 'ok' | 'warn' | 'bad' | 'pend' — used for both icon name and .insight-item tint class (Batch 7).
    const OK = (txt) => ({ status:'ok',   icon:'check_circle',           txt });
    const WN = (txt) => ({ status:'warn', icon:'warning',                txt });
    const BD = (txt) => ({ status:'bad',  icon:'error',                  txt });
    const PD = (txt) => ({ status:'pend', icon:'radio_button_unchecked', txt });
    const insights = [
        a.spend != null ? (a.spend <= budget ? OK(M.spendOk) : BD(M.spendBad)) : PD(M.spendNone),
        a.aCPL  != null ? (a.aCPL  <= rec.cpl ? OK(M.cplOk)   : WN(M.cplBad))   : PD(M.cplNone),
        a.aCR   != null ? (a.aCR   >= crTarget ? OK(M.crOk)   : WN(M.crBad))    : PD(M.crNone),
        a.leads != null ? (a.leads >= rec.expL ? OK(M.leadsOk) : WN(M.leadsBad)) : PD(M.leadsNone),
        a.ql    != null ? (a.ql    >= rec.expQL ? OK(M.qlOk)  : WN(M.qlBad))    : PD(M.qlNone),
        a.meet  != null ? (a.meet  >= rec.expMeet ? OK(M.meetOk) : WN(M.meetBad)) : PD(M.meetNone),
        a.deals != null ? (a.deals >= rec.td ? OK(M.dealsOk)  : WN(M.dealsBad)) : PD(M.dealsNone),
    ];

    document.getElementById('insightsBody').innerHTML = insights
        .map(i => `<div class="insight-item is-${i.status}"><span class="material-symbols-outlined insight-icon" aria-hidden="true">${i.icon}</span><span>${i.txt}</span></div>`)
        .join('');

    const ACT = {
      cplH:   isAr ? '↑ CPL أعلى من المستهدف:' : '↑ CPL above target:',
      cplA:   isAr ? ['راجع استهداف الإعلانات وقلّل التكاليف على الجماهير الضعيفة', 'حسّن جودة المحتوى الإعلاني والصور', 'اختبر قنوات إعلانية بديلة'] :
                    ['Review ad targeting and cut spend on weak audiences', 'Improve ad creative quality', 'Test cheaper alternative channels'],
      crH:    isAr ? '↓ Close Rate أقل من المستهدف:' : '↓ Close rate below target:',
      crA:    isAr ? ['حسّن جودة Leads عبر استهداف أدق', 'راجع سرعة استجابة فريق المبيعات', 'ادعم المبيعات بمحتوى أقوى'] :
                    ['Improve lead quality with tighter targeting', 'Review sales response speed', 'Equip sales with stronger content'],
      meetH:  isAr ? '↓ Meetings أقل من المطلوب:' : '↓ Meetings below target:',
      meetA:  isAr ? ['راجع معدلات Follow-up', 'ضع KPI يومي للاجتماعات', 'قدّم حوافز على الاجتماعات المحددة'] :
                    ['Review follow-up rates', 'Set a daily meetings KPI', 'Incentivize confirmed meetings'],
      qlH:    isAr ? '↓ Qualified Leads أقل من المطلوب:' : '↓ Qualified leads below target:',
      qlA:    isAr ? ['حسّن نموذج التأهيل', 'راجع جودة الإعلانات', 'قدّم محتوى يجذب العملاء الجادين'] :
                    ['Improve the qualification form', 'Review ad quality and audience', 'Publish content that attracts serious buyers'],
    };
    const actions = [];
    function push(h, arr) { actions.push(h, ...arr.map(x => '&nbsp;&nbsp;• ' + x)); }
    if (a.aCPL && a.aCPL > rec.cpl) push(ACT.cplH, ACT.cplA);
    if (a.aCR && a.aCR < crTarget)   push(ACT.crH, ACT.crA);
    if (a.meet && a.meet < rec.expMeet) push(ACT.meetH, ACT.meetA);
    if (a.ql && a.ql < rec.expQL)    push(ACT.qlH, ACT.qlA);

    document.getElementById('actionBody').innerHTML = actions.length
        ? actions.map(l => (l.startsWith('↑')||l.startsWith('↓'))
            ? `<div style="font-weight:600;margin-top:10px;margin-bottom:4px">${l}</div>`
            : `<div class="action-item">${l}</div>`).join('')
        : `<div class="text-muted">${t("mk.all_on_track")}</div>`;
}

function renderDashboard(c) {
    currentCamp = c;
    const calc = calcKPIs(c);

    renderPhase1(c, calc);
    renderPhase2(c, calc);

    if (c.actual_spend != null) document.getElementById('a_spend').value = parseFloat(c.actual_spend) || '';
    if (c.actual_leads != null) document.getElementById('a_leads').value = c.actual_leads || '';
    if (c.actual_qualified_leads != null) document.getElementById('a_ql').value = c.actual_qualified_leads || '';
    if (c.actual_meetings != null) document.getElementById('a_meet').value = c.actual_meetings || '';
    if (c.actual_follow_ups != null) document.getElementById('a_fu').value = c.actual_follow_ups || '';
    if (c.actual_deals != null) document.getElementById('a_deals').value = c.actual_deals || '';
    calcActuals();

    const grossSrc = c.commission_type === 'percentage'
      ? t('mk.formula_gross_pct')
      : t('mk.formula_gross_fixed');
    const taxPct = (parseFloat(c.tax_rate) * 100).toFixed(0);
    document.getElementById('formulaBox').innerHTML = [
        t('mk.formula_gross').replace('{src}', grossSrc),
        t('mk.formula_net').replace('{tax}', taxPct),
        t('mk.formula_cpd'),
        t('mk.formula_cpl'),
        t('mk.formula_exp_leads'),
        t('mk.formula_exp_deals'),
        t('mk.formula_actual_cr'),
        t('mk.formula_actual_cpl'),
        t('mk.formula_actual_cpd'),
        t('mk.formula_actual_rev'),
    ].join('<br>');

    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('campActions').classList.remove('hidden');
    document.getElementById('campActions').style.display = 'flex';
    applyLang(true);
}

async function loadCampaigns() {
    try {
        campaigns = await api('/api/marketing/campaigns');
        const sel = document.getElementById('campSelect');
        const prev = sel.value;
        sel.innerHTML = `<option value="">${t("mk.pick_campaign")}</option>` +
            campaigns.map(c=>`<option value="${c.id}">${escapeHTML(c.campaign_name)}${c.month?' ('+c.month+')':''}</option>`).join('');
        if (prev) sel.value = prev;
    } catch(e) { toastError(e); }
}

async function selectCampaign() {
    const id = parseInt(document.getElementById('campSelect').value);
    if (!id) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('campActions').classList.add('hidden');
        currentCamp = null;
        return;
    }
    try {
        const c = await api(`/api/marketing/campaigns/${id}`);
        renderDashboard(c);
    } catch(e) { toastError(e); }
}

async function saveActuals() {
    if (!currentCamp) return;
    const body = {
        actual_spend:           parseFloat(document.getElementById('a_spend').value)||0,
        actual_leads:           parseInt(document.getElementById('a_leads').value)||0,
        actual_qualified_leads: parseInt(document.getElementById('a_ql').value)||0,
        actual_meetings:        parseInt(document.getElementById('a_meet').value)||0,
        actual_follow_ups:      parseInt(document.getElementById('a_fu').value)||0,
        actual_deals:           parseInt(document.getElementById('a_deals').value)||0,
    };
    try {
        await api(`/api/marketing/campaigns/${currentCamp.id}/actuals`, { method:'PUT', body });
        toast(t("mk.saved_actuals"), 'success');
    } catch(e) { toastError(e); }
}

function openNew() {
    editingCampId = null;
    document.getElementById('campModalTitle').textContent = t("mk.modal_title_new");
    document.getElementById('campErr').classList.remove('show');
    ['f_name','f_price','f_budget','f_comm','f_cr'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f_tax').value = '19';
    document.getElementById('f_ctype').value = 'percentage';
    document.getElementById('f_month').value = '';
    applyLang(true);
    openModal('campModal');
}

function editCurrent() {
    if (!currentCamp) return;
    editingCampId = currentCamp.id;
    document.getElementById('campModalTitle').textContent = t("mk.modal_title_edit") + ': ' + currentCamp.campaign_name;
    document.getElementById('campErr').classList.remove('show');
    document.getElementById('f_name').value   = currentCamp.campaign_name;
    document.getElementById('f_price').value  = currentCamp.avg_unit_price;
    document.getElementById('f_budget').value = currentCamp.campaign_budget;
    document.getElementById('f_comm').value   = currentCamp.commission_input;
    document.getElementById('f_ctype').value  = currentCamp.commission_type;
    document.getElementById('f_cr').value     = (parseFloat(currentCamp.expected_close_rate)*100).toFixed(2);
    document.getElementById('f_tax').value    = (parseFloat(currentCamp.tax_rate)*100).toFixed(0);
    document.getElementById('f_month').value  = currentCamp.month || '';
    applyLang(true);
    openModal('campModal');
}

async function saveCampaign() {
    const name = document.getElementById('f_name').value.trim();
    const err = document.getElementById('campErr');
    err.classList.remove('show');
    if (!name) {
        err.textContent = t("errors.campaign_name_required"); err.classList.add('show'); return;
    }
    const price = parseFloat(document.getElementById('f_price').value);
    const budget = parseFloat(document.getElementById('f_budget').value);
    const comm = parseFloat(document.getElementById('f_comm').value);
    const cr = parseFloat(document.getElementById('f_cr').value);
    if (!(price > 0) || !(budget > 0) || !(comm > 0) || !(cr > 0)) {
        err.textContent = t("errors.invalid_input"); err.classList.add('show'); return;
    }
    const body = {
        campaign_name:       name,
        avg_unit_price:      price,
        campaign_budget:     budget,
        commission_input:    comm,
        commission_type:     document.getElementById('f_ctype').value,
        expected_close_rate: cr,
        tax_rate:            parseFloat(document.getElementById('f_tax').value)||19,
        month:               document.getElementById('f_month').value||null,
    };
    try {
        let cid;
        if (editingCampId) {
            await api(`/api/marketing/campaigns/${editingCampId}`, { method:'PUT', body });
            cid = editingCampId;
        } else {
            const r = await api('/api/marketing/campaigns', { method:'POST', body });
            cid = r.id;
        }
        toast(t("common.saved"), 'success');
        closeModal('campModal');
        await loadCampaigns();
        document.getElementById('campSelect').value = cid;
        selectCampaign();
    } catch(e) {
        err.textContent = tError(e); err.classList.add('show');
    }
}

function deleteCurrent() {
    if (!currentCamp) return;
    document.getElementById('campDeleteName').textContent = currentCamp.campaign_name || '';
    openModal('campDeleteModal');
}

async function confirmDelete() {
    if (!currentCamp) { closeModal('campDeleteModal'); return; }
    const id = currentCamp.id;
    try {
        await api(`/api/marketing/campaigns/${id}`, {method:'DELETE'});
        closeModal('campDeleteModal');
        toast(t("common.deleted"), 'success');
        currentCamp = null;
        document.getElementById('campSelect').value = '';
        await loadCampaigns();
        selectCampaign();
    } catch(e) { toastError(e); }
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => {
        const isActive = p.id === id;
        p.classList.toggle('active', isActive);
    });
    document.querySelectorAll('.tab-btn').forEach(b => {
        const isActive = b === btn;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-selected', isActive ? 'true' : 'false');
        b.setAttribute('tabindex', isActive ? '0' : '-1');
    });
}

// Arrow-key nav between tabs (WAI-ARIA tab pattern)
document.addEventListener('keydown', (e) => {
    const tab = e.target.closest('.tab-btn[role="tab"]');
    if (!tab) return;
    if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight' && e.key !== 'Home' && e.key !== 'End') return;
    e.preventDefault();
    const tabs = [...tab.parentElement.querySelectorAll('.tab-btn[role="tab"]')];
    const idx = tabs.indexOf(tab);
    let next;
    if (e.key === 'Home')      next = tabs[0];
    else if (e.key === 'End')  next = tabs[tabs.length - 1];
    else if (e.key === 'ArrowLeft')  next = tabs[(idx - 1 + tabs.length) % tabs.length];
    else if (e.key === 'ArrowRight') next = tabs[(idx + 1) % tabs.length];
    if (next) {
        next.focus();
        switchTab(next.getAttribute('aria-controls'), next);
    }
});

function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
  ));
}

function onLangChange() {
  if (currentCamp) renderDashboard(currentCamp);
  loadCampaigns();
}

loadCampaigns();
</script>
