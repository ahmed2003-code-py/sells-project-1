{% extends "base.html" %}
{% block title %}{{ "Evaluation" }} — Ain KPI{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="de.title">تقييم الفريق</h1>
    <p class="page-subtitle" data-i18n="de.subtitle">سجّل تقييم المدير لكل Sales</p>
  </div>
</div>

<div class="controls">
  <div class="field">
    <label data-i18n="common.month">الشهر</label>
    <input type="month" id="month" onchange="loadAll()">
  </div>
  <div class="field">
    <label data-i18n="common.filter">فلترة</label>
    <select id="filterStatus" onchange="render()">
      <option value="all" data-i18n="de.all_team">كل الفريق</option>
      <option value="pending" data-i18n="de.waiting_eval">لم يُقيَّم بعد</option>
      <option value="done" data-i18n="de.evaluated">تم التقييم</option>
      <option value="no-sales" data-i18n="de.missing_sales">Sales لم يسجل بعد</option>
    </select>
  </div>
  <div class="spacer"></div>
  <div id="progress" class="text-muted" style="font-size:13px"></div>
</div>

<div id="list" class="stagger"></div>
{% endblock %}

{% block scripts %}
<script>
let users = [];
let entries = {};
const PASSFAIL = ["attitude", "presentation", "behaviour", "appearance", "hr_roles"];

async function loadAll() {
  const month = document.getElementById("month").value;
  if (!month) return;
  try {
    const list = await api("/api/users?role=sales&active_only=true");
    users = list;
    const report = await api(`/api/kpi/report?month=${month}`);
    entries = {};
    report.forEach(r => { entries[r.user_id] = r; });
    render();
  } catch (e) { toast(e.message, "error"); }
}

function render() {
  const filter = document.getElementById("filterStatus").value;
  const container = document.getElementById("list");
  let rows = users.map(u => ({
    user: u,
    entry: entries[u.id] || null,
  }));

  if (filter === "pending") rows = rows.filter(r => r.entry && r.entry.sales_submitted_at && !r.entry.dataentry_submitted_at);
  else if (filter === "done") rows = rows.filter(r => r.entry && r.entry.dataentry_submitted_at);
  else if (filter === "no-sales") rows = rows.filter(r => !r.entry || !r.entry.sales_submitted_at);

  const done = users.filter(u => entries[u.id] && entries[u.id].dataentry_submitted_at).length;
  document.getElementById("progress").innerHTML = `<span data-i18n="de.progress">تم تقييم</span> <b>${done}</b> <span data-i18n="de.of">من</span> ${users.length}`;

  if (!rows.length) {
    container.innerHTML = `<div class="card text-center text-muted">${t("admin.no_users")}</div>`;
    applyLang();
    return;
  }

  container.innerHTML = rows.map(({user, entry}) => renderCard(user, entry)).join("");
  applyLang();
}

function renderCard(user, entry) {
  const hasSales = entry && entry.sales_submitted_at;
  const isDone = entry && entry.dataentry_submitted_at;
  const score = entry ? parseFloat(entry.total_score) || 0 : 0;
  const statusBadges = [];
  if (hasSales) statusBadges.push('<span class="badge badge-vgood">Sales &#10003;</span>');
  else statusBadges.push('<span class="badge badge-pending">Sales &#10007;</span>');
  if (isDone) statusBadges.push('<span class="badge badge-excellent">' + t("de.evaluated") + '</span>');
  else statusBadges.push('<span class="badge badge-pending">' + t("de.waiting_eval") + '</span>');
  if (isDone) statusBadges.push(`<span class="badge badge-excellent">${score.toFixed(1)}%</span>`);

  const freshLeads = entry ? (entry.fresh_leads || 0) : 0;

  let passfailHTML = PASSFAIL.map(k => {
    const label_en = { attitude: "Attitude", presentation: "Presentation", behaviour: "Behaviour", appearance: "Appearance", hr_roles: "HR Roles" }[k];
    const label_ar = { attitude: "السلوك", presentation: "العرض", behaviour: "التصرف", appearance: "المظهر", hr_roles: "HR Roles" }[k];
    const current = entry ? (entry[k] || 0) : 0;
    return `<div>
      <div class="text-muted" style="font-size:11px;margin-bottom:4px" data-i18n-alt>${getLang() === 'ar' ? label_ar : label_en}</div>
      <select id="${k}-${user.id}" class="pf-select">
        <option value="100" ${current == 100 ? 'selected' : ''}>${t("common.pass")}</option>
        <option value="0" ${current == 0 ? 'selected' : ''}>${t("common.fail")}</option>
      </select>
    </div>`;
  }).join("");

  return `<div class="card fade-in" data-user-id="${user.id}">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <div class="flex items-center gap-2">
        <div class="avatar">${(user.full_name || "?")[0]}</div>
        <div>
          <div style="font-weight:500">${user.full_name}</div>
          <div class="text-muted" style="font-size:11px">@${user.username}</div>
        </div>
      </div>
      <div class="flex gap-1" style="flex-wrap:wrap">${statusBadges.join("")}</div>
    </div>

    <div class="field-row" style="margin-bottom:12px">
      <div class="field">
        <label data-i18n="sales.fresh_leads">Fresh Leads</label>
        <input type="number" id="fresh_leads-${user.id}" value="${freshLeads}">
      </div>
      <div class="field">
        <label data-i18n="de.notes">ملاحظات المدير</label>
        <input type="text" id="notes-${user.id}" value="${entry && entry.notes ? entry.notes.replace(/"/g, '&quot;') : ''}" data-i18n-placeholder="de.notes_ph">
      </div>
    </div>

    <div class="field-row five" style="margin-bottom:14px">${passfailHTML}</div>

    <div class="flex gap-1">
      <button class="btn btn-primary btn-sm" onclick="saveEval(${user.id})" data-i18n="de.save_eval">حفظ التقييم</button>
      ${entry ? `<button class="btn btn-sm" onclick="showDetail(${user.id})" data-i18n="common.details">تفاصيل</button>` : ''}
    </div>
  </div>`;
}

async function saveEval(userId) {
  const month = document.getElementById("month").value;
  const body = {
    user_id: userId,
    month: month,
    fresh_leads: document.getElementById(`fresh_leads-${userId}`).value || 0,
    notes: document.getElementById(`notes-${userId}`).value || "",
  };
  PASSFAIL.forEach(k => body[k] = document.getElementById(`${k}-${userId}`).value);

  try {
    const data = await api("/api/kpi/submit/evaluation", { method: "POST", body });
    toast(t("common.saved") + ` — ${data.total_score}%`, "success");
    loadAll();
  } catch (e) { toast(e.message, "error"); }
}

function showDetail(userId) {
  const entry = entries[userId];
  if (!entry) return;
  window.location.href = "/dashboard";
}

function onLangChange() { render(); }

document.getElementById("month").value = currentMonth();
loadAll();
</script>
{% endblock %}
