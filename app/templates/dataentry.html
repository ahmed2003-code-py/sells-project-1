{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block head %}
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
{% endblock %}

{% block content %}
<div class="hero-ribbon">
  <div class="page-header" style="margin-bottom:16px">
    <div>
      <h1 class="page-title" data-i18n="de.title"></h1>
      <p class="page-subtitle" data-i18n="de.subtitle_full"></p>
    </div>
  </div>

  <!-- Progress tiles -->
  <div class="bento" id="deTiles" style="margin-bottom:0">
    <div class="kpi-tile tile-brand span-3"><div class="kpi-tile-head">
      <div class="kpi-tile-icon">👥</div><div class="kpi-tile-label" data-i18n="dash.sales_count"></div>
    </div><div class="kpi-tile-value" id="tile_total">—</div></div>

    <div class="kpi-tile tile-accent span-3"><div class="kpi-tile-head">
      <div class="kpi-tile-icon">✅</div><div class="kpi-tile-label" data-i18n="de.evaluated"></div>
    </div><div class="kpi-tile-value" id="tile_done">—</div><div class="kpi-tile-sub" id="tile_done_sub">&nbsp;</div></div>

    <div class="kpi-tile tile-warm span-3"><div class="kpi-tile-head">
      <div class="kpi-tile-icon">⏳</div><div class="kpi-tile-label" data-i18n="de.waiting_eval"></div>
    </div><div class="kpi-tile-value" id="tile_pending">—</div></div>

    <div class="kpi-tile tile-coral span-3"><div class="kpi-tile-head">
      <div class="kpi-tile-icon">📥</div><div class="kpi-tile-label" data-i18n="de.missing_sales"></div>
    </div><div class="kpi-tile-value" id="tile_missing">—</div></div>
  </div>
</div>

<!-- Status chart row -->
<div class="bento">
  <div class="chart-card span-4">
    <h3 data-i18n="dash.chart_status_split"></h3>
    <div id="chartProgress" class="plotly-container short"></div>
  </div>
  <div class="chart-card span-8">
    <h3 data-i18n="dash.chart_leaderboard"></h3>
    <div id="chartScores" class="plotly-container short"></div>
  </div>
</div>

<div class="controls">
  <div class="field">
    <label data-i18n="common.month"></label>
    <input type="month" id="month" onchange="loadAll()">
  </div>
  <div class="field">
    <label data-i18n="common.filter"></label>
    <select id="filterStatus" onchange="render()">
      <option value="all" data-i18n="de.all_team"></option>
      <option value="pending" data-i18n="de.waiting_eval"></option>
      <option value="done" data-i18n="de.evaluated"></option>
      <option value="no-sales" data-i18n="de.missing_sales"></option>
    </select>
  </div>
  <div class="field">
    <label data-i18n="filters.team"></label>
    <select id="teamFilter" onchange="render()">
      <option value="" data-i18n="common.all"></option>
      <option value="none" data-i18n="filters.no_team"></option>
    </select>
  </div>
  <div class="field" style="flex:1;min-width:180px">
    <label data-i18n="common.search"></label>
    <input type="text" id="searchBox" oninput="render()" data-i18n-placeholder="filters.search_user_ph">
  </div>
  <div class="field" style="align-self:flex-end">
    <button class="btn btn-ghost btn-sm" onclick="resetFilters()" data-i18n="filters.reset"></button>
  </div>
  <div class="spacer"></div>
  <div id="progress" class="text-muted" style="font-size:13px;font-weight:600"></div>
</div>

<div id="chipsRow" class="pf-chips" style="margin-bottom:12px"></div>

<div id="list" class="stagger"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script>
let users = [];
let entries = {};
let teams = [];
const NUMERIC = ["fresh_leads", "calls", "meetings", "crm_pct", "deals",
                 "reports", "reservations", "followup_pct", "attendance_pct"];
const PASSFAIL = ["attitude", "presentation", "behaviour", "appearance", "hr_roles"];
const PCT_FIELDS = new Set(["crm_pct", "followup_pct", "attendance_pct"]);

function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
  ));
}

async function loadAll() {
  const month = document.getElementById("month").value;
  if (!month) return;
  try {
    const [u, report, ts] = await Promise.all([
      api("/api/users?role=sales&active_only=true"),
      api(`/api/kpi/report?month=${month}`),
      teams.length ? Promise.resolve(teams) : api("/api/teams").catch(() => []),
    ]);
    users = u;
    teams = ts || [];
    populateTeamFilter();
    entries = {};
    report.forEach(r => { entries[r.user_id] = r; });
    render();
  } catch (e) { toastError(e); }
}

function populateTeamFilter() {
  const sel = document.getElementById("teamFilter");
  if (!sel) return;
  const prev = sel.value;
  const opts = [
    `<option value="">${t("common.all")}</option>`,
    `<option value="none">${t("filters.no_team")}</option>`,
  ];
  teams.forEach(team => {
    opts.push(`<option value="${team.id}">${escapeHTML(team.name)}</option>`);
  });
  sel.innerHTML = opts.join("");
  if (prev) sel.value = prev;
}

function resetFilters() {
  document.getElementById("filterStatus").value = "all";
  document.getElementById("teamFilter").value = "";
  document.getElementById("searchBox").value = "";
  render();
}

function renderChips() {
  const status = document.getElementById("filterStatus").value;
  const teamVal = document.getElementById("teamFilter").value;
  const search = document.getElementById("searchBox").value.trim();
  const chips = [];
  if (status && status !== "all") {
    const lbl = {
      pending: t("de.waiting_eval"),
      done: t("de.evaluated"),
      "no-sales": t("de.missing_sales"),
    }[status] || status;
    chips.push(`<span class="pf-chip">${t("common.filter")}: ${escapeHTML(lbl)}<button onclick="clearChip('filterStatus','all')">✕</button></span>`);
  }
  if (teamVal) {
    let label = t("filters.no_team");
    if (teamVal !== "none") {
      const tm = teams.find(x => String(x.id) === teamVal);
      label = tm ? tm.name : teamVal;
    }
    chips.push(`<span class="pf-chip">${t("filters.team")}: ${escapeHTML(label)}<button onclick="clearChip('teamFilter','')">✕</button></span>`);
  }
  if (search) {
    chips.push(`<span class="pf-chip">${t("common.search")}: ${escapeHTML(search)}<button onclick="clearChip('searchBox','')">✕</button></span>`);
  }
  document.getElementById("chipsRow").innerHTML = chips.join("");
}

function clearChip(id, val) {
  const el = document.getElementById(id);
  if (el) { el.value = val; render(); }
}

function renderTilesAndCharts() {
  // Compose lists
  const total = users.length;
  const done    = users.filter(u => entries[u.id] && entries[u.id].dataentry_submitted_at).length;
  const pending = users.filter(u => entries[u.id] && entries[u.id].sales_submitted_at && !entries[u.id].dataentry_submitted_at).length;
  const missing = users.filter(u => !entries[u.id] || !entries[u.id].sales_submitted_at).length;

  document.getElementById("tile_total").textContent = total;
  document.getElementById("tile_done").textContent  = done;
  document.getElementById("tile_done_sub").textContent = total ? Math.round(done/total*100) + "%" : "0%";
  document.getElementById("tile_pending").textContent = pending;
  document.getElementById("tile_missing").textContent = missing;

  if (typeof Plotly === 'undefined') return;

  // Status donut
  const labels = [], values = [], colors = [];
  if (done)    { labels.push(t("de.evaluated"));    values.push(done);    colors.push(Charts.COLORS.accent2); }
  if (pending) { labels.push(t("de.waiting_eval")); values.push(pending); colors.push(Charts.COLORS.warning2); }
  if (missing) { labels.push(t("de.missing_sales"));values.push(missing); colors.push(Charts.COLORS.danger2); }
  if (values.length) {
    Charts.drawDonut("chartProgress", { labels, values, colors }, { centerText: total + "" });
  } else {
    document.getElementById("chartProgress").innerHTML = `<div class="empty-state" style="padding:30px">${t("dash.no_data")}</div>`;
  }

  // Top scores horizontal bar — only show users with submissions
  const scored = users
    .map(u => ({ u, e: entries[u.id] }))
    .filter(x => x.e && (x.e.sales_submitted_at || x.e.dataentry_submitted_at))
    .map(x => ({ name: x.u.full_name, score: parseFloat(x.e.total_score) || 0 }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  if (scored.length) {
    Charts.drawHorizontalBar("chartScores", {
      x: scored.map(s => s.score).reverse(),
      y: scored.map(s => s.name).reverse(),
      colors: scored.map(s => Charts.scoreColorHex(s.score)).reverse(),
      labels: scored.map(s => s.score.toFixed(1) + "%").reverse(),
    });
  } else {
    document.getElementById("chartScores").innerHTML = `<div class="empty-state" style="padding:30px">${t("dash.no_data")}</div>`;
  }
}

function render() {
  const filter = document.getElementById("filterStatus").value;
  const teamVal = document.getElementById("teamFilter").value;
  const search = (document.getElementById("searchBox").value || "").trim().toLowerCase();
  const container = document.getElementById("list");

  let rows = users.map(u => ({ user: u, entry: entries[u.id] || null }));

  if (filter === "pending") rows = rows.filter(r => r.entry && r.entry.sales_submitted_at && !r.entry.dataentry_submitted_at);
  else if (filter === "done") rows = rows.filter(r => r.entry && r.entry.dataentry_submitted_at);
  else if (filter === "no-sales") rows = rows.filter(r => !r.entry || !r.entry.sales_submitted_at);

  if (teamVal === "none") rows = rows.filter(r => r.user.team_id == null);
  else if (teamVal) rows = rows.filter(r => String(r.user.team_id || "") === teamVal);

  if (search) rows = rows.filter(r =>
    (r.user.full_name || "").toLowerCase().includes(search) ||
    (r.user.username || "").toLowerCase().includes(search));

  const done = users.filter(u => entries[u.id] && entries[u.id].dataentry_submitted_at).length;
  document.getElementById("progress").textContent =
    `${t("de.progress")} ${done} ${t("de.of")} ${users.length}  ·  ${t("filters.shown")} ${rows.length}`;

  renderChips();
  renderTilesAndCharts();

  if (!rows.length) {
    container.innerHTML = `<div class="card text-center text-muted" style="padding:50px">${t("admin.no_users")}</div>`;
    return;
  }

  container.innerHTML = rows.map(({user, entry}) => renderCard(user, entry)).join("");
}

function renderCard(user, entry) {
  const isDone = entry && entry.dataentry_submitted_at;
  const hasNumeric = entry && entry.sales_submitted_at;
  const score = entry ? parseFloat(entry.total_score) || 0 : 0;

  const statusBadges = [];
  statusBadges.push(hasNumeric
    ? '<span class="badge badge-vgood">' + t("de.sales_done") + '</span>'
    : '<span class="badge badge-pending">' + t("de.sales_not_done") + '</span>');
  statusBadges.push(isDone
    ? '<span class="badge badge-excellent">' + t("de.evaluated") + '</span>'
    : '<span class="badge badge-pending">' + t("de.waiting_eval") + '</span>');

  const v = (key, def = "") => {
    if (!entry || entry[key] == null) return def;
    return entry[key];
  };

  const numericInputs = NUMERIC.map(k => {
    const isPct = PCT_FIELDS.has(k);
    return `<div class="field">
      <label>${t("kpi." + k)} ${isPct ? " %" : ""}</label>
      <input type="number" min="0" ${isPct ? 'max="100" step="0.1"' : ""}
             id="${k}-${user.id}" value="${escapeHTML(v(k, ""))}">
    </div>`;
  }).join("");

  const passfailInputs = PASSFAIL.map(k => {
    const current = entry ? (entry[k] || 0) : 0;
    return `<div class="field">
      <label>${t("kpi." + k)}</label>
      <select id="${k}-${user.id}">
        <option value="100" ${current == 100 ? 'selected' : ''}>${t("common.pass")}</option>
        <option value="0"   ${current == 0   ? 'selected' : ''}>${t("common.fail")}</option>
      </select>
    </div>`;
  }).join("");

  // Score badge with bar visualisation if data exists
  const scoreBlock = isDone
    ? `<div style="display:flex;align-items:center;gap:12px;min-width:180px">
        <div class="score-display" style="margin:0;padding:14px 18px;text-align:center;flex:1">
          <div class="num ${scoreClass(score)}" style="font-size:28px">${score.toFixed(1)}%</div>
          <div class="label" style="font-size:10px;margin-top:4px">${t("rating." + (entry.rating || "Pending"))}</div>
        </div>
       </div>`
    : "";

  return `<div class="card fade-in reveal" data-user-id="${user.id}">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <div class="flex items-center gap-2">
        <div class="avatar">${escapeHTML((user.full_name || "?")[0])}</div>
        <div>
          <div style="font-weight:700;font-size:15px">${escapeHTML(user.full_name)}</div>
          <div class="text-muted" style="font-size:11px">@${escapeHTML(user.username)}</div>
        </div>
      </div>
      <div class="flex items-center gap-2" style="flex-wrap:wrap">
        ${statusBadges.join("")}
        ${scoreBlock}
      </div>
    </div>

    <div class="form-section-title" style="margin-top:14px">${t("sales.numeric_perf")}</div>
    <div class="field-row four" style="margin-bottom:12px">${numericInputs}</div>

    <div class="form-section-title">${t("tl_eval.personal_eval")}</div>
    <div class="field-row five" style="margin-bottom:14px">${passfailInputs}</div>

    <div class="field" style="margin-bottom:14px">
      <label>${t("de.notes")}</label>
      <input type="text" id="notes-${user.id}"
             value="${escapeHTML(entry && entry.notes ? entry.notes : '')}"
             placeholder="${t("de.notes_ph")}" maxlength="400">
    </div>

    <div class="flex gap-1">
      <button class="btn btn-primary btn-sm hyper-btn" onclick="saveEval(${user.id})">${t("de.save_eval")}</button>
      ${entry ? `<button class="btn btn-sm" onclick="showDetail(${user.id})">${t("common.details")}</button>` : ''}
    </div>
  </div>`;
}

function scoreClass(score) {
  if (score >= 90) return "excellent";
  if (score >= 75) return "vgood";
  if (score >= 55) return "good";
  if (score >= 40) return "medium";
  return "weak";
}

async function saveEval(userId) {
  const month = document.getElementById("month").value;
  const body = {
    user_id: userId,
    month,
    notes: document.getElementById(`notes-${userId}`).value || "",
  };

  let hasNumeric = false;
  NUMERIC.forEach(k => {
    const el = document.getElementById(`${k}-${userId}`);
    const raw = (el.value || "").trim();
    if (raw === "") return;
    const n = Number(raw);
    if (isNaN(n) || n < 0) return;
    body[k] = n;
    hasNumeric = true;
  });

  if (!hasNumeric && !confirm(t("de.confirm_no_numeric"))) return;

  PASSFAIL.forEach(k => body[k] = document.getElementById(`${k}-${userId}`).value);

  try {
    const data = await api("/api/kpi/submit/evaluation", { method: "POST", body });
    toast(`${t("common.saved")} — ${data.total_score}%`, "success");
    loadAll();
  } catch (e) { toastError(e); }
}

function showDetail(userId) {
  window.location.href = "/dashboard";
}

function onLangChange() { render(); }

document.getElementById("month").value = currentMonth();
loadAll();
</script>
{% endblock %}
