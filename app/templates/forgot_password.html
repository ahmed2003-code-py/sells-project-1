{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card hyper-pop">
    <div class="auth-logo">
      <div class="auth-logo-icon">A</div>
      <div class="auth-logo-text" data-i18n="app.name">Ain Real Estate</div>
    </div>
    <p class="auth-subtitle" data-i18n="auth.forgot_subtitle"></p>

    <div class="auth-lang-row">
      <button id="langToggleBtn" class="lang-toggle">EN</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="forgotForm" novalidate>
      <div class="field">
        <label data-i18n="auth.email"></label>
        <input type="email" id="email" required autocomplete="email"
               data-i18n-placeholder="auth.email_placeholder" autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full hyper-btn" id="btn"
              data-i18n="auth.send_reset_link"></button>
    </form>

    <div class="auth-switch">
      <a href="/login" data-i18n="auth.back_to_login"></a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const form = document.getElementById("forgotForm");
const btn = document.getElementById("btn");
const errBox = document.getElementById("errorMsg");
const okBox = document.getElementById("successMsg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errBox.classList.remove("show");
  okBox.classList.remove("show");
  const email = document.getElementById("email").value.trim().toLowerCase();
  if (!email) {
    errBox.textContent = t("errors.email_required");
    errBox.classList.add("show");
    return;
  }
  btn.disabled = true;
  const prev = btn.textContent;
  btn.innerHTML = '<span class="loading"></span>';
  try {
    await api("/api/auth/forgot-password", { method: "POST", body: { email } });
    okBox.textContent = t("auth.reset_email_sent");
    okBox.classList.add("show");
    form.reset();
  } catch (err) {
    errBox.textContent = tError(err);
    errBox.classList.add("show");
  } finally {
    btn.disabled = false;
    btn.textContent = prev;
  }
});
</script>
{% endblock %}
