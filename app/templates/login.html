{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card hyper-pop">
    <div class="auth-logo">
      <div class="auth-logo-icon">A</div>
      <div class="auth-logo-text" data-i18n="app.name">Ain Real Estate</div>
    </div>
    <p class="auth-subtitle" data-i18n="auth.subtitle_login"></p>

    <div class="auth-lang-row">
      <button id="langToggleBtn" class="lang-toggle">EN</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label data-i18n="auth.username"></label>
        <input type="text" id="username" autocomplete="username" required autofocus
               maxlength="50">
      </div>
      <div class="field">
        <label data-i18n="auth.password"></label>
        <input type="password" id="password" autocomplete="current-password" required
               maxlength="128">
      </div>
      <button type="submit" class="btn btn-primary btn-full hyper-btn" id="loginBtn"
              data-i18n="auth.login_btn"></button>
    </form>

    <div class="auth-switch">
      <a href="/forgot-password" data-i18n="auth.forgot"></a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const errorMsg = document.getElementById("errorMsg");
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.classList.remove("show");
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  if (!username || !password) {
    errorMsg.textContent = t("errors.required_fields_missing");
    errorMsg.classList.add("show");
    return;
  }
  btn.disabled = true;
  const prev = btn.textContent;
  btn.innerHTML = '<span class="loading"></span>';

  try {
    const data = await api("/api/auth/login", {
      method: "POST",
      body: { username, password },
    });
    window.location.href = data.redirect || "/";
  } catch (err) {
    errorMsg.textContent = tError(err);
    errorMsg.classList.add("show");
    btn.disabled = false;
    btn.textContent = prev;
  }
});
</script>
{% endblock %}
