{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card hyper-pop">
    <div class="auth-logo">
      <div class="auth-logo-icon">A</div>
      <div class="auth-logo-text" data-i18n="app.name">Ain Real Estate</div>
    </div>
    <p class="auth-subtitle" data-i18n="auth.reset_subtitle"></p>

    <div class="auth-lang-row">
      <button id="langToggleBtn" class="lang-toggle">EN</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="resetForm" novalidate>
      <div class="field">
        <label data-i18n="auth.new_password"></label>
        <input type="password" id="pw" minlength="8" required autocomplete="new-password" autofocus>
        <small class="text-dim" data-i18n="auth.password_hint"></small>
      </div>
      <div class="field">
        <label data-i18n="auth.confirm_password"></label>
        <input type="password" id="pw2" minlength="8" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full hyper-btn" id="btn"
              data-i18n="auth.reset_btn"></button>
    </form>

    <div class="auth-switch">
      <a href="/login" data-i18n="auth.back_to_login"></a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const token = new URLSearchParams(window.location.search).get("token") || "";
const form = document.getElementById("resetForm");
const btn = document.getElementById("btn");
const errBox = document.getElementById("errorMsg");
const okBox = document.getElementById("successMsg");

(async function validate() {
  if (!token) {
    errBox.textContent = t("errors.invalid_token");
    errBox.classList.add("show");
    form.querySelector("button[type=submit]").disabled = true;
    return;
  }
  try {
    const r = await api("/api/auth/reset-password/validate?token=" + encodeURIComponent(token));
    if (!r.valid) {
      const code = r.reason === "expired" ? "token_expired" : "invalid_token";
      errBox.textContent = t("errors." + code);
      errBox.classList.add("show");
      form.querySelector("button[type=submit]").disabled = true;
    }
  } catch (e) {
    errBox.textContent = tError(e);
    errBox.classList.add("show");
  }
})();

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errBox.classList.remove("show");
  okBox.classList.remove("show");
  const pw = document.getElementById("pw").value;
  const pw2 = document.getElementById("pw2").value;
  if (pw !== pw2) {
    errBox.textContent = t("errors.passwords_do_not_match");
    errBox.classList.add("show");
    return;
  }
  btn.disabled = true;
  const prev = btn.textContent;
  btn.innerHTML = `<span class="loading"></span><span style="margin-inline-start:8px">${t("common.loading")}</span>`;
  try {
    await api("/api/auth/reset-password", {
      method: "POST",
      body: { token, new_password: pw },
    });
    okBox.textContent = t("auth.reset_ok");
    okBox.classList.add("show");
    setTimeout(() => { window.location.href = "/login"; }, 1600);
  } catch (err) {
    errBox.textContent = tError(err);
    errBox.classList.add("show");
    btn.disabled = false;
    btn.textContent = prev;
  }
});
</script>
{% endblock %}
