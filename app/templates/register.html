{% extends "base.html" %}
{% block title %}إنشاء حساب — Ain KPI{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">A</div>
      <div class="auth-logo-text">Ain Real Estate</div>
    </div>
    <p class="auth-subtitle">إنشاء حساب جديد كـ Sales</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registerForm">
      <div class="field">
        <label>الاسم الكامل</label>
        <input type="text" id="full_name" required autofocus>
      </div>
      <div class="field">
        <label>اسم المستخدم <small>(للدخول)</small></label>
        <input type="text" id="username" pattern="[a-z0-9_.]{3,}" title="أحرف إنجليزية صغيرة وأرقام فقط، 3 أحرف على الأقل" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label>البريد الإلكتروني <small>(اختياري)</small></label>
          <input type="email" id="email">
        </div>
        <div class="field">
          <label>رقم الموبايل <small>(اختياري)</small></label>
          <input type="tel" id="phone">
        </div>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="password" minlength="4" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn">إنشاء الحساب</button>
    </form>

    <div class="auth-switch">
      لديك حساب بالفعل؟ <a href="/login">تسجيل الدخول</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const errorMsg = document.getElementById("errorMsg");
const form = document.getElementById("registerForm");
const btn = document.getElementById("btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.classList.remove("show");
  btn.disabled = true;
  btn.textContent = "جاري الإنشاء...";

  try {
    await api("/api/auth/register", {
      method: "POST",
      body: {
        username: document.getElementById("username").value.trim().toLowerCase(),
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value,
      },
    });
    toast("تم إنشاء الحساب! جاري التحويل لتسجيل الدخول...", "success");
    setTimeout(() => window.location.href = "/login", 1500);
  } catch (err) {
    errorMsg.textContent = err.message || "حدث خطأ";
    errorMsg.classList.add("show");
    btn.disabled = false;
    btn.textContent = "إنشاء الحساب";
  }
});
</script>
{% endblock %}
