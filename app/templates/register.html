{% extends "base.html" %}
{% block title %}{{ "إنشاء حساب" }} — Ain KPI{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">A</div>
      <div class="auth-logo-text" data-i18n="app.name">Ain Real Estate</div>
    </div>
    <p class="auth-subtitle" data-i18n="auth.subtitle_register">إنشاء حساب جديد كـ Sales</p>

    <div class="auth-lang-row">
      <button id="langToggleBtn" class="lang-toggle">EN</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registerForm">
      <div class="field">
        <label data-i18n="auth.full_name">الاسم الكامل</label>
        <input type="text" id="full_name" required autofocus>
      </div>
      <div class="field">
        <label><span data-i18n="auth.username">اسم المستخدم</span></label>
        <input type="text" id="username" pattern="[a-z0-9_.]{3,}" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label><span data-i18n="auth.email">البريد الإلكتروني</span> <small data-i18n="auth.optional">اختياري</small></label>
          <input type="email" id="email">
        </div>
        <div class="field">
          <label><span data-i18n="auth.phone">رقم الموبايل</span> <small data-i18n="auth.optional">اختياري</small></label>
          <input type="tel" id="phone">
        </div>
      </div>
      <div class="field">
        <label data-i18n="auth.password">كلمة المرور</label>
        <input type="password" id="password" minlength="4" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn" data-i18n="auth.register_btn">إنشاء الحساب</button>
    </form>

    <div class="auth-switch">
      <span data-i18n="auth.have_account">لديك حساب بالفعل؟</span>
      <a href="/login" data-i18n="auth.login_here">تسجيل الدخول</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const errorMsg = document.getElementById("errorMsg");
const form = document.getElementById("registerForm");
const btn = document.getElementById("btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.classList.remove("show");
  btn.disabled = true;
  btn.textContent = t("common.saving");

  try {
    await api("/api/auth/register", {
      method: "POST",
      body: {
        username: document.getElementById("username").value.trim().toLowerCase(),
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value,
      },
    });
    toast(t("common.saved"), "success");
    setTimeout(() => window.location.href = "/login", 1500);
  } catch (err) {
    errorMsg.textContent = err.message || t("common.error");
    errorMsg.classList.add("show");
    btn.disabled = false;
    btn.textContent = t("auth.register_btn");
  }
});
</script>
{% endblock %}
