{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block head %}
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="fin.title"></h1>
    <p class="page-subtitle" data-i18n="fin.subtitle"></p>
  </div>
  <div class="flex gap-2">
    <button class="btn" onclick="window.print()" data-i18n="common.print"></button>
    <button class="btn" onclick="exportCSV()" data-i18n="common.export"></button>
  </div>
</div>

<div class="controls">
  <div class="field">
    <label data-i18n="common.month"></label>
    <select id="selMonth" onchange="loadAll()"></select>
  </div>
  <div class="field">
    <label data-i18n="fin.avg_deal"></label>
    <input type="number" id="avgDeal" value="2500000" onchange="loadAll()" style="width:180px">
  </div>
  <div class="field">
    <label data-i18n="fin.commission_rate"></label>
    <input type="number" id="commissionRate" value="2.5" step="0.1" onchange="loadAll()" style="width:140px">
  </div>
  <div class="spacer"></div>
</div>

<div class="stats-grid stagger" id="totals"></div>

<div class="chart-grid">
  <div class="chart-card">
    <h3 data-i18n="fin.chart_revenue_by_sales"></h3>
    <div id="chartRevenue" class="plotly-container"></div>
  </div>
  <div class="chart-card">
    <h3 data-i18n="fin.chart_commission_split"></h3>
    <div id="chartCommission" class="plotly-container"></div>
  </div>
</div>

<div class="chart-card">
  <h3 data-i18n="fin.chart_monthly_trend"></h3>
  <div id="chartTrend" class="plotly-container"></div>
</div>

<div class="chart-card">
  <h3 data-i18n="fin.deals_vs_reservations"></h3>
  <div id="chartDealsRes" class="plotly-container"></div>
</div>

<div class="table-wrap reveal">
  <table>
    <thead><tr>
      <th style="width:50px">#</th>
      <th data-i18n="admin.user"></th>
      <th data-i18n="fin.deals_count"></th>
      <th data-i18n="fin.reservations_count"></th>
      <th data-i18n="fin.deal_revenue"></th>
      <th data-i18n="fin.reservation_revenue"></th>
      <th data-i18n="fin.total_revenue"></th>
      <th data-i18n="fin.total_commission"></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script>
let reportData = null;
let trendData = null;

async function initMonths() {
  try {
    const months = await api("/api/kpi/months");
    const sel = document.getElementById("selMonth");
    const cur = currentMonth();
    sel.innerHTML = "";
    const monthSet = new Set(months);
    monthSet.add(cur);
    [...monthSet].sort().reverse().forEach(m => {
      const o = document.createElement("option");
      o.value = m; o.textContent = fmtMonth(m);
      if (m === cur) o.selected = true;
      sel.appendChild(o);
    });
  } catch (e) { console.error(e); }
}

async function loadAll() {
  const month = document.getElementById("selMonth").value;
  const avgDeal = parseFloat(document.getElementById("avgDeal").value) || 2500000;
  const commRate = (parseFloat(document.getElementById("commissionRate").value) || 2.5) / 100;
  if (avgDeal <= 0 || commRate < 0) return toast(t("errors.invalid_input"), "error");
  try {
    const qs = `month=${month}&avg_deal_value_egp=${avgDeal}&commission_rate=${commRate}`;
    reportData = await api(`/api/finance/report?${qs}`);
    trendData = await api("/api/finance/trend?months_back=6");
    render();
  } catch (e) { toastError(e); }
}

function render() {
  if (!reportData) return;
  const totals = reportData.totals;
  const breakdown = reportData.breakdown;
  renderTotals(totals);
  renderCharts(breakdown);
  renderTable(breakdown);
  renderTrend();
}

function renderTotals(totals) {
  document.getElementById("totals").innerHTML = `
    <div class="stat success">
      <div class="stat-label">${t("fin.total_revenue")}</div>
      <div class="stat-value money-big money">${fmtMoney(totals.total_revenue)}</div>
      <div class="stat-sub">${t("fin.egp")}</div>
    </div>
    <div class="stat accent">
      <div class="stat-label">${t("fin.total_commission")}</div>
      <div class="stat-value money" style="color:var(--accent-2)">${fmtMoney(totals.total_commission)}</div>
      <div class="stat-sub">${t("fin.egp")}</div>
    </div>
    <div class="stat">
      <div class="stat-label">${t("fin.total_deals")}</div>
      <div class="stat-value">${totals.total_deals}</div>
    </div>
    <div class="stat">
      <div class="stat-label">${t("fin.total_reservations")}</div>
      <div class="stat-value">${totals.total_reservations}</div>
    </div>
    <div class="stat warn">
      <div class="stat-label">${t("fin.avg_commission_per_sales")}</div>
      <div class="stat-value sm money">${fmtMoney(totals.avg_commission_per_sales)}</div>
    </div>
  `;
}

function renderCharts(rows) {
  if (typeof Plotly === 'undefined' || !rows.length) return;

  const sortedByRev = [...rows].sort((a,b) => b.total_revenue - a.total_revenue);
  Charts.drawHorizontalBar("chartRevenue", {
    x: sortedByRev.map(r => r.total_revenue).reverse(),
    y: sortedByRev.map(r => r.user_name).reverse(),
    colors: sortedByRev.map((_, i) => Charts.PALETTE[i % Charts.PALETTE.length]).reverse(),
    labels: sortedByRev.map(r => fmtMoney(r.total_revenue)).reverse(),
  }, { margin: { l: 120, r: 100, t: 20, b: 40 } });

  const dealComm = rows.reduce((a, r) => a + r.deal_commission, 0);
  const resComm = rows.reduce((a, r) => a + r.reservation_commission, 0);
  Charts.drawDonut("chartCommission", {
    labels: [t("fin.deal_revenue"), t("fin.reservation_revenue")],
    values: [dealComm, resComm],
    colors: [Charts.COLORS.brand, Charts.COLORS.accent],
  }, { centerText: fmtMoney(dealComm + resComm) });

  const topRows = sortedByRev.slice(0, 8);
  Charts.drawStackedBar("chartDealsRes",
    [
      { name: t("fin.deals_count"), values: topRows.map(r => r.deals_count), color: Charts.COLORS.brand },
      { name: t("fin.reservations_count"), values: topRows.map(r => r.reservations_count), color: Charts.COLORS.accent },
    ],
    topRows.map(r => r.user_name),
    { showlegend: true }
  );
}

function renderTrend() {
  if (!trendData || !trendData.length) return;
  const xLabels = trendData.map(t => fmtMonth(t.month));

  Charts.drawLineChart("chartTrend", [
    {
      name: t("fin.total_revenue"),
      x: xLabels,
      y: trendData.map(t => t.revenue),
      color: Charts.COLORS.brand,
      fill: true,
    },
    {
      name: t("fin.total_commission"),
      x: xLabels,
      y: trendData.map(t => t.commission),
      color: Charts.COLORS.accent,
      fill: false,
    },
  ], { showlegend: true });
}

function renderTable(rows) {
  const tbody = document.getElementById("tbody");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="table-empty">' + t("dash.no_data") + '</td></tr>';
    return;
  }
  const sorted = [...rows].sort((a,b) => b.total_revenue - a.total_revenue);
  tbody.innerHTML = sorted.map((r, i) => {
    const rankCls = i === 0 ? "r1" : i === 1 ? "r2" : i === 2 ? "r3" : "";
    return `<tr>
      <td><span class="rank ${rankCls}">${i + 1}</span></td>
      <td style="font-weight:500">${r.user_name}</td>
      <td>${r.deals_count}</td>
      <td>${r.reservations_count}</td>
      <td class="money">${fmtMoney(r.deal_revenue)}</td>
      <td class="money">${fmtMoney(r.reservation_revenue)}</td>
      <td class="money text-success" style="font-weight:600">${fmtMoney(r.total_revenue)}</td>
      <td class="money" style="color:var(--accent-2);font-weight:600">${fmtMoney(r.total_commission)}</td>
    </tr>`;
  }).join("");
}

function exportCSV() {
  if (!reportData) return;
  const rows = reportData.breakdown;
  const header = [t("admin.user"), t("fin.deals_count"), t("fin.reservations_count"),
                  t("fin.deal_revenue"), t("fin.reservation_revenue"),
                  t("fin.total_revenue"), t("fin.total_commission")];
  const lines = [header.join(",")];
  rows.forEach(r => {
    lines.push([r.user_name, r.deals_count, r.reservations_count,
      r.deal_revenue, r.reservation_revenue, r.total_revenue, r.total_commission].join(","));
  });
  const blob = new Blob(["\uFEFF" + lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `finance_${reportData.month || "all"}.csv`;
  a.click();
}

function onLangChange() { render(); }

initMonths().then(loadAll);
</script>
{% endblock %}
