{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block main_class %}narrow{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="sales.title"></h1>
    <p class="page-subtitle" data-i18n="sales.subtitle"></p>
  </div>
</div>

<div class="controls">
  <div class="field">
    <label data-i18n="common.month"></label>
    <input type="month" id="month" onchange="loadEntry()">
  </div>
  <div class="spacer"></div>
  <div id="statusLabel"></div>
</div>

<div id="scorePreview" class="hidden">
  <div class="score-display">
    <div class="num" id="scoreNum">—</div>
    <div class="label" id="scoreLabel" data-i18n="sales.prelim_score"></div>
  </div>
</div>

<form id="salesForm">
  <div class="form-section">
    <div class="form-section-title" data-i18n="sales.basic_data"></div>
    <div class="field">
      <label>
        <span data-i18n="sales.fresh_leads"></span>
        <small data-i18n="sales.fresh_leads_hint"></small>
      </label>
      <input type="number" min="0" id="fresh_leads" required oninput="livePreview()">
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title" data-i18n="sales.numeric_perf"></div>
    <div class="field-row">
      <div class="field">
        <label><span data-i18n="kpi.calls"></span> <small><span data-i18n="sales.target"></span>: 2000</small></label>
        <input type="number" min="0" id="calls" oninput="livePreview()">
      </div>
      <div class="field">
        <label><span data-i18n="kpi.meetings"></span> <small>20% <span data-i18n="sales.of_leads"></span></small></label>
        <input type="number" min="0" id="meetings" oninput="livePreview()">
      </div>
      <div class="field">
        <label><span data-i18n="kpi.crm_pct"></span> % <small><span data-i18n="sales.target"></span>: 95%</small></label>
        <input type="number" min="0" max="100" step="0.1" id="crm_pct" oninput="livePreview()">
      </div>
      <div class="field">
        <label><span data-i18n="kpi.deals"></span> <small>3% <span data-i18n="sales.of_leads"></span></small></label>
        <input type="number" min="0" id="deals" oninput="livePreview()">
      </div>
      <div class="field">
        <label><span data-i18n="kpi.reports"></span> <small><span data-i18n="sales.target"></span>: 4</small></label>
        <input type="number" min="0" id="reports" oninput="livePreview()">
      </div>
      <div class="field">
        <label><span data-i18n="kpi.reservations"></span> <small>7% <span data-i18n="sales.of_leads"></span></small></label>
        <input type="number" min="0" id="reservations" oninput="livePreview()">
      </div>
      <div class="field">
        <label><span data-i18n="kpi.followup_pct"></span> % <small><span data-i18n="sales.target"></span>: 100%</small></label>
        <input type="number" min="0" max="100" step="0.1" id="followup_pct" oninput="livePreview()">
      </div>
      <div class="field">
        <label><span data-i18n="kpi.attendance_pct"></span> % <small><span data-i18n="sales.target"></span>: 100%</small></label>
        <input type="number" min="0" max="100" step="0.1" id="attendance_pct" oninput="livePreview()">
      </div>
    </div>
  </div>

  <div class="flex gap-2">
    <button type="submit" class="btn btn-primary hyper-btn" id="submitBtn" data-i18n="sales.submit"></button>
    <button type="button" class="btn btn-ghost" onclick="loadEntry()" data-i18n="sales.cancel_edits"></button>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const FIELDS = ["fresh_leads","calls","meetings","crm_pct","deals","reports","reservations","followup_pct","attendance_pct"];
const TARGETS = {
  calls: { type: "fixed", val: 2000 },
  meetings: { type: "pct", val: 0.20 },
  crm_pct: { type: "fixed", val: 95 },
  deals: { type: "pct", val: 0.03 },
  reports: { type: "fixed", val: 4 },
  reservations: { type: "pct", val: 0.07 },
  followup_pct: { type: "fixed", val: 100 },
  attendance_pct: { type: "fixed", val: 100 },
};
const WEIGHTS = {
  calls: 15, meetings: 8, crm_pct: 10, deals: 10, reports: 8,
  reservations: 7, followup_pct: 15, attendance_pct: 7,
};
// Non-evaluated weights (filled by Data Entry) — added to preliminary calc as 0
const TOTAL_WEIGHT = 100;

function setMonthField() {
  const el = document.getElementById("month");
  if (!el.value) el.value = currentMonth();
}

async function loadEntry() {
  const userId = "{{ user.id }}";
  const month = document.getElementById("month").value;
  if (!month) return;

  try {
    const entry = await api(`/api/kpi/entry/${userId}/${month}`);
    fillForm(entry);
    updateStatus(entry);
    livePreview();
  } catch (e) {
    if (e.status !== 404) toastError(e);
    clearForm();
    updateStatus(null);
    livePreview();
  }
}

function fillForm(entry) {
  if (!entry) { clearForm(); return; }
  FIELDS.forEach(f => {
    const el = document.getElementById(f);
    if (el) el.value = entry[f] != null ? entry[f] : "";
  });
}

function clearForm() {
  FIELDS.forEach(f => {
    const el = document.getElementById(f);
    if (el) el.value = "";
  });
}

function updateStatus(entry) {
  const el = document.getElementById("statusLabel");
  if (!entry) {
    el.innerHTML = `<div class="status-bar pending">${t("sales.status_pending")}</div>`;
  } else if (entry.dataentry_submitted_at) {
    el.innerHTML = `<div class="status-bar done">${t("sales.status_complete")}</div>`;
  } else if (entry.sales_submitted_at) {
    el.innerHTML = `<div class="status-bar info">${t("sales.status_waiting_mgr")}</div>`;
  } else {
    el.innerHTML = `<div class="status-bar pending">${t("sales.status_pending")}</div>`;
  }
}

function livePreview() {
  const L = parseFloat(document.getElementById("fresh_leads").value) || 0;
  let weightedSum = 0;

  Object.keys(WEIGHTS).forEach(key => {
    const actual = parseFloat(document.getElementById(key).value) || 0;
    const target = TARGETS[key].type === "fixed" ? TARGETS[key].val : L * TARGETS[key].val;
    const achievement = target > 0 ? Math.min(actual / target, 1) : 0;
    weightedSum += achievement * WEIGHTS[key];
  });

  const totalScore = weightedSum;
  const preview = document.getElementById("scorePreview");
  const scoreNum = document.getElementById("scoreNum");
  preview.classList.remove("hidden");
  scoreNum.textContent = totalScore.toFixed(1) + "%";

  const rating = totalScore >= 90 ? "Excellent" : totalScore >= 75 ? "V.Good"
               : totalScore >= 55 ? "Good" : totalScore >= 40 ? "Medium"
               : totalScore >= 25 ? "Weak" : "Bad";
  document.getElementById("scoreLabel").textContent =
    t("sales.prelim_score") + " — " + t("rating." + rating);
}

document.getElementById("salesForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  const prev = btn.textContent;
  btn.textContent = t("common.saving");

  const body = { month: document.getElementById("month").value };
  FIELDS.forEach(f => body[f] = document.getElementById(f).value || 0);

  try {
    const data = await api("/api/kpi/submit/sales", { method: "POST", body });
    toast(t("common.saved") + ` — ${data.total_score}%`, "success");
    setTimeout(loadEntry, 500);
  } catch (err) {
    toastError(err);
  } finally {
    btn.disabled = false;
    btn.textContent = prev;
  }
});

function onLangChange() { loadEntry(); }

setMonthField();
loadEntry();
</script>
{% endblock %}
